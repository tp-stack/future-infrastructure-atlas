required_source_fields:
  - source_id
  - source_key
  - source_name
  - category
  - source_type
  - reliability_class
  - license
  - url
  - update_frequency
  - allowed_usage
  - access_method
  - requires_license_review
  - expected_formats
  - geographic_scope
  - notes

required_dataset_fields:
  - dataset_key
  - display_name
  - source_key
  - category
  - target_layer
  - expected_geometry_type
  - expected_format
  - update_frequency
  - license
  - sensitivity_level
  - allowed_precision
  - ingestion_status
  - raw_storage_policy
  - processed_storage_policy
  - checksum_required
  - validation_required
  - notes

required_layer_fields:
  - layer_id
  - display_name
  - category
  - geometry_type
  - min_zoom
  - max_zoom
  - sensitivity_level
  - allowed_precision
  - required_fields
  - optional_fields
  - source_dataset_keys
  - confidence_policy
  - public_visibility
  - enterprise_visibility

blocked_missing_fields:
  - source_key
  - dataset_key
  - layer_id
  - license
  - allowed_usage
  - sensitivity_level
  - allowed_precision
  - confidence_policy
  - source_dataset_keys

allowed_source_types: [official, open, community, premium, research, inferred]
allowed_reliability_classes: [A, B, C, D, P]
allowed_access_methods: [api, direct_download, manual_download, web_reference, licensed_export, derived]
allowed_ingestion_statuses: [not_started, metadata_ready, ingestion_ready, ingested, blocked_license, blocked_quality, deprecated]
allowed_sensitivity_levels: [low, medium, high, restricted]
allowed_precision_values: [exact_public, generalized, regional, inferred, city, country, metro_level, source_native]

checksum_algorithm: sha256
require_license: true
require_allowed_usage: true
require_confidence_policy: true
require_sensitivity_level: true
require_source_dataset_link: true
