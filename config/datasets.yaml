datasets:
  - dataset_key: wri_global_power_plants
    display_name: WRI Global Power Plants
    source_key: wri_global_power_plant_database
    category: energy
    target_layer: power_plants
    expected_geometry_type: Point
    expected_format: csv
    update_frequency: to_verify
    license: to_verify
    sensitivity_level: medium
    allowed_precision: source_native
    ingestion_status: metadata_ready
    raw_storage_policy: data_raw_or_object_storage_only
    processed_storage_policy: data_processed_or_object_storage_only
    checksum_required: true
    validation_required: true
    required_fields:
      - name
      - country
      - fuel_type
      - capacity_mw
      - latitude
      - longitude
    field_map:
      primary_fuel: fuel_type
    notes: Metadata placeholder only. No source data has been downloaded or ingested.

