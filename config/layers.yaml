layers:
  - layer_id: submarine_cables
    display_name: Submarine Cables
    category: internet_infrastructure
    geometry_type: LineString
    min_zoom: 2
    max_zoom: 12
    sensitivity_level: medium
    allowed_precision: generalized
    required_fields: [asset_id, source_id, asset_name, confidence_score]
    optional_fields: [operator, status, landing_points, source_timestamp, mapped_status, geometry_precision]
    source_dataset_keys: [osm_telecom_infrastructure, scn_submarine_cables]
    confidence_policy: source_reliability_plus_spatial_precision_required
    public_visibility: true
    enterprise_visibility: true

  - layer_id: landing_stations
    display_name: Landing Stations
    category: internet_infrastructure
    geometry_type: Point
    min_zoom: 4
    max_zoom: 12
    sensitivity_level: high
    allowed_precision: generalized
    required_fields: [asset_id, source_id, asset_name, confidence_score]
    optional_fields: [country, operator, status, source_timestamp]
    source_dataset_keys: [osm_telecom_infrastructure]
    confidence_policy: source_reliability_plus_spatial_precision_required
    public_visibility: false
    enterprise_visibility: true

  - layer_id: ixps
    display_name: Internet Exchange Points
    category: internet_infrastructure
