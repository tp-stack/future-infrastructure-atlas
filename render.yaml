services:
  - type: web
    name: future-site-selection-api
    env: python
    repo: https://github.com/tp-stack/future-infrastructure-atlas
    branch: master
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/site-selection/health
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: SITE_SELECTION_STORAGE_DIR
        value: /opt/render/project/src/data/reports/site_selection
