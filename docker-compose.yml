services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: future_infrastructure_atlas_postgis
    environment:
      POSTGRES_DB: future_atlas
      POSTGRES_USER: future_atlas
      POSTGRES_PASSWORD: future_atlas_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U future_atlas -d future_atlas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgis_data:
